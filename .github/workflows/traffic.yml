name: Collect Daejeon Traffic Data

on:
  workflow_dispatch:

  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: write

jobs:
  collect-traffic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Collect traffic data
        env:
          DATA_API_KEY: ${{ secrets.DATA_API_KEY }}
        run: python traffic_collect.py

      - name: Save collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/traffic_raw.csv

          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "Collect traffic data"
            git push
          fi
